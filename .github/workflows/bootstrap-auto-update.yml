name: NasTech Bootstrap Auto-Update

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    name: Check for newer bootstrap
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect latest bootstrap version
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Checking latest NasUX-Packages bootstrap release ==="

          # Primary: check nastech-ai/NasUX-Packages for a bootstrap release
          LATEST_TAG=$(gh api \
            "repos/nastech-ai/NasUX-Packages/releases?per_page=30" \
            --jq '[.[] | select(.tag_name | startswith("bootstrap-")) |
                   select(.tag_name | contains("apt.android-7")) |
                   .tag_name][0]' 2>/dev/null || echo "")

          if [ -z "${LATEST_TAG}" ] || [ "${LATEST_TAG}" = "null" ]; then
            echo "❌ No NasUX-Packages bootstrap release found. Publish a release at:"
            echo "   https://github.com/nastech-ai/NasUX-Packages/releases"
            echo "   with tag prefix 'bootstrap-' and variant 'apt.android-7'."
            exit 1
          fi
          BOOTSTRAP_SOURCE="nasux-packages"
          echo "BOOTSTRAP_SOURCE=${BOOTSTRAP_SOURCE}" >> $GITHUB_OUTPUT

          # Extract just the date+rev part: bootstrap-2026.06.07-r1+apt.android-7 -> 2026.06.07-r1
          LATEST_VERSION=$(echo "${LATEST_TAG}" \
            | sed 's/^bootstrap-//' \
            | sed 's/[+%].*$//')

          echo "Latest upstream: ${LATEST_TAG}  (version: ${LATEST_VERSION})"

          # Extract the current version from build.gradle
          CURRENT_VERSION=$(grep 'def version = "' app/build.gradle \
            | head -1 \
            | sed -r 's/.*"([0-9]{4}\.[0-9]{2}\.[0-9]{2}-r[0-9]+)".*/\1/')

          echo "Current in repo: ${CURRENT_VERSION}"

          if [ "${LATEST_VERSION}" = "${CURRENT_VERSION}" ]; then
            echo "✅ Bootstrap is already up to date (${CURRENT_VERSION}). Nothing to do."
            echo "UPDATE_NEEDED=false" >> $GITHUB_OUTPUT
          else
            echo "🔄 Update available: ${CURRENT_VERSION} → ${LATEST_VERSION}"
            echo "UPDATE_NEEDED=true"           >> $GITHUB_OUTPUT
            echo "LATEST_TAG=${LATEST_TAG}"     >> $GITHUB_OUTPUT
            echo "LATEST_VERSION=${LATEST_VERSION}" >> $GITHUB_OUTPUT
            echo "CURRENT_VERSION=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Download new bootstrap zips and compute SHA-256
        if: steps.detect.outputs.UPDATE_NEEDED == 'true'
        id: download
        run: |
          LATEST_TAG="${{ steps.detect.outputs.LATEST_TAG }}"

          # URL-encode the + character in the tag name
          URL_TAG=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe='-.'))" \
            "${LATEST_TAG}")

          BASE_URL="https://github.com/nastech-ai/NasUX-Packages/releases/download/bootstrap-${URL_TAG}"
          echo "Downloading from: ${BASE_URL} (source: ${{ steps.detect.outputs.BOOTSTRAP_SOURCE }})"
          echo ""

          declare -A CS
          for arch in aarch64 arm i686 x86_64; do
            URL="${BASE_URL}/bootstrap-${arch}.zip"
            DEST="/tmp/bootstrap-${arch}.zip"
            echo "↓ bootstrap-${arch}.zip"
            if ! curl -fL --connect-timeout 30 --max-time 300 \
                 --retry 3 --retry-delay 5 \
                 -o "${DEST}" "${URL}"; then
              echo "❌ Failed to download ${URL}"
              exit 1
            fi
            CHECKSUM=$(sha256sum "${DEST}" | cut -d' ' -f1)
            CS[$arch]="${CHECKSUM}"
            SIZE=$(du -h "${DEST}" | cut -f1)
            echo "  ✅ ${arch}: ${CHECKSUM}  (${SIZE})"
          done

          echo "CHECKSUM_AARCH64=${CS[aarch64]}" >> $GITHUB_OUTPUT
          echo "CHECKSUM_ARM=${CS[arm]}"         >> $GITHUB_OUTPUT
          echo "CHECKSUM_I686=${CS[i686]}"       >> $GITHUB_OUTPUT
          echo "CHECKSUM_X86_64=${CS[x86_64]}"  >> $GITHUB_OUTPUT

      - name: Update build.gradle
        if: steps.detect.outputs.UPDATE_NEEDED == 'true'
        env:
          LATEST_VERSION:    ${{ steps.detect.outputs.LATEST_VERSION }}
          CHECKSUM_AARCH64:  ${{ steps.download.outputs.CHECKSUM_AARCH64 }}
          CHECKSUM_ARM:      ${{ steps.download.outputs.CHECKSUM_ARM }}
          CHECKSUM_I686:     ${{ steps.download.outputs.CHECKSUM_I686 }}
          CHECKSUM_X86_64:   ${{ steps.download.outputs.CHECKSUM_X86_64 }}
        run: |
          # Update the version comment line
          sed -i -E \
            "s|// bootstrap-[0-9.]+-r[0-9]+\+apt\.android-7.*|// bootstrap-${LATEST_VERSION}+apt.android-7 (latest; checksums verified at build time)|" \
            app/build.gradle

          # Update the version string:  def version = "OLD" + "%2B" + "apt.android-7"
          sed -i -E \
            "s|def version = \"[0-9.]+-r[0-9]+\" \\+ \"%2B\" \\+ \"apt\\.android-7\"|def version = \"${LATEST_VERSION}\" + \"%2B\" + \"apt.android-7\"|" \
            app/build.gradle

          # Update all four bootstrap checksums (64-char hex strings)
          sed -i -E \
            "s|(downloadBootstrap\\(\"aarch64\",[[:space:]]*\")([0-9a-f]{64})(\")|\\1${CHECKSUM_AARCH64}\\3|" \
            app/build.gradle
          sed -i -E \
            "s|(downloadBootstrap\\(\"arm\",[[:space:]]*\")([0-9a-f]{64})(\")|\\1${CHECKSUM_ARM}\\3|" \
            app/build.gradle
          sed -i -E \
            "s|(downloadBootstrap\\(\"i686\",[[:space:]]*\")([0-9a-f]{64})(\")|\\1${CHECKSUM_I686}\\3|" \
            app/build.gradle
          sed -i -E \
            "s|(downloadBootstrap\\(\"x86_64\",[[:space:]]*\")([0-9a-f]{64})(\")|\\1${CHECKSUM_X86_64}\\3|" \
            app/build.gradle

          # Verify substitutions landed
          if grep -q "\"${LATEST_VERSION}\"" app/build.gradle \
            && grep -q "${CHECKSUM_AARCH64}" app/build.gradle; then
            echo "✅ build.gradle updated to bootstrap ${LATEST_VERSION}"
          else
            echo "❌ Verification failed — sed substitutions did not apply" && exit 1
          fi

      - name: Show diff
        if: steps.detect.outputs.UPDATE_NEEDED == 'true'
        run: git diff app/build.gradle

      - name: Create pull request
        if: steps.detect.outputs.UPDATE_NEEDED == 'true'
        env:
          GH_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          LATEST_VERSION:   ${{ steps.detect.outputs.LATEST_VERSION }}
          CURRENT_VERSION:  ${{ steps.detect.outputs.CURRENT_VERSION }}
          LATEST_TAG:       ${{ steps.detect.outputs.LATEST_TAG }}
          CHECKSUM_AARCH64: ${{ steps.download.outputs.CHECKSUM_AARCH64 }}
          CHECKSUM_ARM:     ${{ steps.download.outputs.CHECKSUM_ARM }}
          CHECKSUM_I686:    ${{ steps.download.outputs.CHECKSUM_I686 }}
          CHECKSUM_X86_64:  ${{ steps.download.outputs.CHECKSUM_X86_64 }}
        run: |
          BRANCH="auto/bootstrap-${LATEST_VERSION}"

          # Create or reset the update branch
          git config user.name  "NasTech Bootstrap Bot"
          git config user.email "nastech-bot@users.noreply.github.com"
          git checkout -B "${BRANCH}"
          git add app/build.gradle

          # Build commit message via temp file (avoids column-0 content in YAML block scalar)
          _COMMIT_MSG_F=$(mktemp)
          echo "chore(bootstrap): update to ${LATEST_VERSION}"                   >> "${_COMMIT_MSG_F}"
          echo ""                                                                 >> "${_COMMIT_MSG_F}"
          echo "Bootstrap: ${CURRENT_VERSION} → ${LATEST_VERSION}"               >> "${_COMMIT_MSG_F}"
          echo "Source tag: ${LATEST_TAG}"                                        >> "${_COMMIT_MSG_F}"
          echo ""                                                                 >> "${_COMMIT_MSG_F}"
          echo "SHA-256 checksums (verified):"                                   >> "${_COMMIT_MSG_F}"
          echo "  aarch64: ${CHECKSUM_AARCH64}"                                  >> "${_COMMIT_MSG_F}"
          echo "  arm:     ${CHECKSUM_ARM}"                                       >> "${_COMMIT_MSG_F}"
          echo "  i686:    ${CHECKSUM_I686}"                                      >> "${_COMMIT_MSG_F}"
          echo "  x86_64:  ${CHECKSUM_X86_64}"                                   >> "${_COMMIT_MSG_F}"
          git commit -F "${_COMMIT_MSG_F}"
          rm -f "${_COMMIT_MSG_F}"

          git push --force origin "${BRANCH}"

          # Close any existing PR for this bootstrap version first
          gh pr list --head "${BRANCH}" --json number --jq '.[].number' \
            | xargs -r -I{} gh pr close {} --comment "Superseded by new push." 2>/dev/null || true

          # Build PR body via temp file
          _PR_BODY_F=$(mktemp)
          echo "## 🔄 Bootstrap Auto-Update"                                                                                            >> "${_PR_BODY_F}"
          echo ""                                                                                                                        >> "${_PR_BODY_F}"
          echo "| | |"                                                                                                                   >> "${_PR_BODY_F}"
          echo "|---|---|"                                                                                                               >> "${_PR_BODY_F}"
          echo "| **Previous version** | \`${CURRENT_VERSION}\` |"                                                                      >> "${_PR_BODY_F}"
          echo "| **New version**      | \`${LATEST_VERSION}\` |"                                                                       >> "${_PR_BODY_F}"
          echo "| **Source tag**       | [\`${LATEST_TAG}\`](https://github.com/nastech-ai/NasUX-Packages/releases/tag/${LATEST_TAG}) |"   >> "${_PR_BODY_F}"
          echo ""                                                                                                                        >> "${_PR_BODY_F}"
          echo "### Verified SHA-256 checksums"                                                                                         >> "${_PR_BODY_F}"
          echo "| ABI | SHA-256 |"                                                                                                       >> "${_PR_BODY_F}"
          echo "|---|---|"                                                                                                               >> "${_PR_BODY_F}"
          echo "| \`aarch64\` | \`${CHECKSUM_AARCH64}\` |"                                                                              >> "${_PR_BODY_F}"
          echo "| \`arm\`     | \`${CHECKSUM_ARM}\` |"                                                                                   >> "${_PR_BODY_F}"
          echo "| \`i686\`    | \`${CHECKSUM_I686}\` |"                                                                                  >> "${_PR_BODY_F}"
          echo "| \`x86_64\`  | \`${CHECKSUM_X86_64}\` |"                                                                               >> "${_PR_BODY_F}"
          echo ""                                                                                                                        >> "${_PR_BODY_F}"
          echo "### What this changes"                                                                                                   >> "${_PR_BODY_F}"
          echo "- Updates the bootstrap download version in \`app/build.gradle\`"                                                        >> "${_PR_BODY_F}"
          echo "- Updates all 8 SHA-256 checksums (both build variants)"                                                                 >> "${_PR_BODY_F}"
          echo "- Merging this PR will trigger a new build + auto-publish with the updated Linux userland"                               >> "${_PR_BODY_F}"
          echo ""                                                                                                                        >> "${_PR_BODY_F}"
          echo "---"                                                                                                                     >> "${_PR_BODY_F}"
          echo "*Opened automatically by NasTech Bootstrap Auto-Update bot*"                                                             >> "${_PR_BODY_F}"

          PR_URL=$(gh pr create \
            --title "Bootstrap update: ${CURRENT_VERSION} → ${LATEST_VERSION}" \
            --body-file "${_PR_BODY_F}" \
            --head "${BRANCH}" \
            --base master \
            --label "dependencies" 2>/dev/null || echo "(PR already open)")
          rm -f "${_PR_BODY_F}"

          echo "✅ Pull request: ${PR_URL}"
