name: Android Lint & Code Health

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-lint-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-lint-

      - name: Run Android Lint
        run: |
          ./gradlew lint --continue --no-daemon 2>&1 | tee lint-output.txt || LINT_FAILED=true

          echo ""
          echo "=== Lint Report Summary ==="
          # Summarise errors/warnings from all modules
          for f in app/build/reports/lint-results*.xml \
                   nasux-shared/build/reports/lint-results*.xml \
                   terminal-emulator/build/reports/lint-results*.xml \
                   terminal-view/build/reports/lint-results*.xml; do
            if [ -f "$f" ]; then
              ERRORS=$(grep -c 'severity="Error"' "$f" || echo 0)
              WARNINGS=$(grep -c 'severity="Warning"' "$f" || echo 0)
              echo "  $(dirname $f | cut -d/ -f1): $ERRORS errors, $WARNINGS warnings"
            fi
          done

          if [ "${LINT_FAILED}" = "true" ]; then
            echo ""
            echo "❌ Lint found errors — see report below:"
            grep -A3 'severity="Error"' app/build/reports/lint-results*.xml 2>/dev/null | head -60 || true
            exit 1
          fi
          echo "✅ Lint passed."

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/lint-results*.xml
          retention-days: 14

  missing-r-imports:
    name: Check Missing R Imports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for missing R class imports
        shell: bash
        run: |
          echo "=== Scanning for missing R imports in sub-package Java files ==="
          VIOLATIONS=0

          # Find Java files in sub-packages (not the root package) that reference R.
          # These MUST import the R class explicitly since it lives in the root package.
          while IFS= read -r file; do
            PKG=$(grep -m1 '^package ' "$file" | sed 's/package //;s/;//;s/ //g')
            NAMESPACE="com.nastech.nasux"

            # Only flag sub-packages (com.nastech.nasux.something)
            if [[ "$PKG" != "$NAMESPACE" && "$PKG" == "${NAMESPACE}."* ]]; then
              # Check if file uses R. references
              if grep -q '\bR\.\(layout\|id\|string\|color\|drawable\|menu\|xml\|raw\|attr\|style\|dimen\|anim\|array\)\b' "$file"; then
                # Check if it already imports the R class
                if ! grep -q "import ${NAMESPACE}\.R;" "$file"; then
                  echo "  ❌ Missing 'import ${NAMESPACE}.R;' in: $file (package: $PKG)"
                  VIOLATIONS=$((VIOLATIONS + 1))
                fi
              fi
            fi
          done < <(find app/src/main/java -name "*.java")

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo ""
            echo "❌ $VIOLATIONS file(s) are missing the R import. Run the auto-fix-bot workflow to fix automatically."
            exit 1
          fi
          echo "✅ All R imports present."

  resource-health:
    name: Resource & Manifest Health
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check layout files referenced in Java exist
        shell: bash
        run: |
          echo "=== Checking layout references ==="
          VIOLATIONS=0
          LAYOUT_DIR="app/src/main/res/layout"

          while IFS= read -r file; do
            while IFS= read -r layout; do
              if [ ! -f "$LAYOUT_DIR/${layout}.xml" ]; then
                echo "  ❌ Missing layout: $LAYOUT_DIR/${layout}.xml (referenced in $file)"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            done < <(grep -oP 'R\.layout\.\K\w+' "$file" 2>/dev/null || true)
          done < <(find app/src/main/java -name "*.java")

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "❌ $VIOLATIONS missing layout file(s)."
            exit 1
          fi
          echo "✅ All referenced layouts exist."

      - name: Check color references exist
        shell: bash
        run: |
          echo "=== Checking color references ==="
          COLORS_FILE="app/src/main/res/values/colors.xml"
          VIOLATIONS=0

          while IFS= read -r file; do
            while IFS= read -r color; do
              if ! grep -q "name=\"${color}\"" "$COLORS_FILE"; then
                echo "  ❌ Missing color: $color (referenced in $file)"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            done < <(grep -oP 'R\.color\.\K\w+' "$file" 2>/dev/null || true)
          done < <(find app/src/main/java -name "*.java")

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "❌ $VIOLATIONS missing color(s)."
            exit 1
          fi
          echo "✅ All referenced colors exist."

      - name: Check string references exist
        shell: bash
        run: |
          echo "=== Checking string references ==="
          STRINGS_FILE="app/src/main/res/values/strings.xml"
          VIOLATIONS=0

          while IFS= read -r file; do
            while IFS= read -r str; do
              if ! grep -q "name=\"${str}\"" "$STRINGS_FILE"; then
                echo "  ❌ Missing string: $str (referenced in $file)"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            done < <(grep -oP 'R\.string\.\K\w+' "$file" 2>/dev/null || true)
          done < <(find app/src/main/java -name "*.java")

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "❌ $VIOLATIONS missing string(s)."
            exit 1
          fi
          echo "✅ All referenced strings exist."
