# NasUX Super-Vivid AMOLED Terminal Color Scheme
# Pure Black base + NasTech AI neon palette — maximum visibility
# Place this file at ~/.nasux/colors.properties to apply
# (auto-applied by NasUXInstaller on first launch)

# Background — true AMOLED black (OLED power saving + max contrast)
background=#000000

# Foreground — soft cool white
foreground=#E8EDF3

# Cursor — NasTech teal (unmistakable)
cursor=#00D4AA

# ─── Normal ANSI Colors ──────────────────────────────────────────
# Black (slightly visible dark grey)
color0=#1C1C1C
# Red — electric neon red
color1=#FF3333
# Green — NasTech teal (brand color as green)
color2=#00D4AA
# Yellow — pure gold
color3=#FFD700
# Blue — vivid sky blue
color4=#3DC3FF
# Magenta — neon pink-purple
color5=#FF00FF
# Cyan — neon aqua
color6=#00FFDD
# White — cool grey-white
color7=#D0D8E0

# ─── Bright ANSI Colors ──────────────────────────────────────────
# Bright Black (dark grey — visible separator)
color8=#666666
# Bright Red — softer neon red
color9=#FF6E6E
# Bright Green — bright teal
color10=#4DFFD4
# Bright Yellow — brilliant lemon
color11=#FFFF4D
# Bright Blue — electric sky
color12=#80DAFF
# Bright Magenta — hot pink
color13=#FF80FF
# Bright Cyan — bright aqua
color14=#80FFE8
# Bright White — pure white
color15=#FFFFFF
