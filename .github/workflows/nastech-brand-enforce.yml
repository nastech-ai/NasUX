name: NasTech Brand Enforcement

on:
  push:
    branches: [ master, main, 'github-releases/**' ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  brand-check:
    name: Enforce NasTech Branding
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for upstream branding violations
        shell: bash
        run: |
          echo "=== NasTech Brand Enforcement ==="
          echo "Scanning for upstream branding references in NasUX source files…"

          VIOLATIONS=0

          # Find violations in Java, XML, Kotlin, Gradle, Markdown files.
          # Excludes:
          #   - .git / .local / .agents dirs (internal)
          #   - nastech-agent (bundled third-party docs)
          #   - bootstrap installer path-rewrite code (com.termux paths are matched
          #     against embedded strings inside upstream bootstrap ZIPs — protected)
          #   - SourceForge mirror URL in build.gradle / workflows (external project name)
          #   - apt_info_script / nastech-wrappers.sh (delegation internals)
          FOUND=$(grep -rn --include="*.java" --include="*.xml" --include="*.kt" \
              --include="*.gradle" --include="*.md" \
              -i "termux" . \
              --exclude-dir=".git" \
              --exclude-dir=".local" \
              --exclude-dir="nastech-agent" \
              --exclude-dir=".agents" \
              | grep -v "apt_info_script" \
              | grep -v "nastech-wrappers" \
              | grep -v "sourceforge\.net.*termux-packages\.mirror" \
              | grep -v "downloads\.sourceforge\.net.*termux-packages\.mirror" \
              | grep -v "termux-packages\.mirror" \
              | grep -v "com\.termux.*bootstrap\|bootstrap.*com\.termux" \
              | grep -v "\.replace.*com\.termux" \
              || true)

          if [ -n "$FOUND" ]; then
            echo ""
            echo "❌ BRAND VIOLATION: Upstream branding found in NasUX source files:"
            echo "$FOUND"
            echo ""
            echo "All user-facing text must say 'NasUX' or 'NasTech AI'."
            VIOLATIONS=1
          else
            echo "✅ No branding violations found."
          fi

          if [ $VIOLATIONS -ne 0 ]; then
            exit 1
          fi

      - name: Verify NasTech strings present
        shell: bash
        run: |
          echo "=== Verifying NasTech strings exist ==="
          for term in "NasTech" "NasUX" "nastech_accent" "nastech_fab"; do
            COUNT=$(grep -r "$term" --include="*.java" --include="*.xml" --include="*.gradle" \
              . --exclude-dir=".git" --exclude-dir=".local" | wc -l || echo 0)
            echo "  $term: $COUNT occurrences"
            if [ "$COUNT" -lt 1 ]; then
              echo "❌ Required NasTech string '$term' not found!"
              exit 1
            fi
          done
          echo "✅ All required NasTech branding strings present."

      - name: Summary
        if: always()
        run: |
          echo "Brand enforcement complete."
          echo "All NasUX/NasTech branding verified."
