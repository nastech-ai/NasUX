version: 2
updates:

  # ── GitHub Actions ────────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    commit-message:
      prefix: "ci(deps)"
    labels:
      - dependencies
      - github-actions

  # ── Gradle (Android) dependencies ─────────────────────────────────────────────
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "06:00"
      timezone: UTC
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - android
    open-pull-requests-limit: 10
    groups:
      androidx:
        patterns:
          - "androidx.*"
        update-types:
          - minor
          - patch
      material:
        patterns:
          - "com.google.android.material*"
        update-types:
          - minor
          - patch

