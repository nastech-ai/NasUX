name: NasTech Issue Bot

on:
  workflow_run:
    workflows:
      - "Build NasUX"
      - "Unit tests"
      - "NasTech Brand Enforcement"
      - "Validate Gradle Wrapper"
      - "Android Lint & Code Health"
      - "CodeQL Security Analysis"
      - "NasUX Auto-Publish"
      - "NasTech Auto-Fix Bot"
      - "Dependency Vulnerability Audit"
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  issues: write
  contents: read
  actions: read

jobs:
  issue-bot:
    name: Issue Bot — ${{ github.event.workflow_run.name || 'manual' }}
    runs-on: ubuntu-latest

    steps:
      - name: Handle workflow result
        shell: bash
        env:
          GH_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          WF_NAME:        ${{ github.event.workflow_run.name }}
          WF_CONCLUSION:  ${{ github.event.workflow_run.conclusion }}
          WF_HTML_URL:    ${{ github.event.workflow_run.html_url }}
          WF_RUN_ID:      ${{ github.event.workflow_run.id }}
          WF_HEAD_SHA:    ${{ github.event.workflow_run.head_sha }}
          WF_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO:           ${{ github.repository }}
        run: |
          # Guard: nothing to do if triggered without a workflow_run payload
          if [ -z "${WF_NAME}" ] || [ -z "${WF_CONCLUSION}" ]; then
            echo "No workflow_run payload — manual trigger or unsupported event. Skipping."
            exit 0
          fi

          SHORT_SHA="${WF_HEAD_SHA:0:7}"
          LABEL="ci-failure"
          ISSUE_TITLE="[CI Failure] ${WF_NAME}"

          echo "Workflow : ${WF_NAME}"
          echo "Result   : ${WF_CONCLUSION}"
          echo "SHA      : ${SHORT_SHA}"

          # ── Ensure labels exist (ignore errors if they already do) ────────────
          gh label create "${LABEL}" \
            --description "Automated CI failure tracked by NasTech Issue Bot" \
            --color "d73a4a" --repo "${REPO}" 2>/dev/null || true

          gh label create "ci-fixed" \
            --description "CI issue resolved and auto-closed" \
            --color "0e8a16" --repo "${REPO}" 2>/dev/null || true

          gh label create "auto-bot" \
            --description "Created or managed by NasTech Issue Bot" \
            --color "e4e669" --repo "${REPO}" 2>/dev/null || true

          # ── Find any open issue for this workflow ─────────────────────────────
          EXISTING_ISSUE=""
          EXISTING_ISSUE=$(gh issue list \
            --repo "${REPO}" \
            --state open \
            --label "${LABEL}" \
            --json number,title \
            --jq ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" \
            2>/dev/null | head -1) || EXISTING_ISSUE=""

          if [ "${WF_CONCLUSION}" = "failure" ]; then
            # ── BUILD FAILED ──────────────────────────────────────────────────

            # Try to collect failed job details; fall back gracefully
            FAILED_JOBS=""
            if [ -n "${WF_RUN_ID}" ]; then
              FAILED_JOBS=$(gh api \
                "repos/${REPO}/actions/runs/${WF_RUN_ID}/jobs" \
                --jq '.jobs[] | select(.conclusion=="failure") |
                      "- **\(.name)**" +
                      if (.steps | length) > 0
                      then " — failed step: `" + (
                        (.steps[] | select(.conclusion=="failure") | .name)
                        // "unknown"
                      ) + "`"
                      else ""
                      end' \
                2>/dev/null | head -10) || FAILED_JOBS=""
            fi
            [ -z "${FAILED_JOBS}" ] && FAILED_JOBS="- (see run logs for details)"

            NOW=$(date -u +"%Y-%m-%d %H:%M UTC")
            _BODY_F=$(mktemp)
            echo "## ❌ CI Failure Detected"                                                          >> "${_BODY_F}"
            echo ""                                                                                   >> "${_BODY_F}"
            echo "**Workflow:** \`${WF_NAME}\`"                                                       >> "${_BODY_F}"
            echo "**Branch:**   \`${WF_HEAD_BRANCH}\`"                                                >> "${_BODY_F}"
            echo "**Commit:**   [\`${SHORT_SHA}\`](https://github.com/${REPO}/commit/${WF_HEAD_SHA})" >> "${_BODY_F}"
            echo "**Run:**      [View run logs](${WF_HTML_URL})"                                      >> "${_BODY_F}"
            echo "**Time:**     ${NOW}"                                                               >> "${_BODY_F}"
            echo ""                                                                                   >> "${_BODY_F}"
            echo "### Failed Jobs"                                                                    >> "${_BODY_F}"
            echo "${FAILED_JOBS}"                                                                     >> "${_BODY_F}"
            echo ""                                                                                   >> "${_BODY_F}"
            echo "### How to fix"                                                                     >> "${_BODY_F}"
            echo "1. Click **View run logs** above to see the full error"                             >> "${_BODY_F}"
            echo "2. Fix the problem in your code and push to master"                                 >> "${_BODY_F}"
            echo "3. This issue closes automatically when the workflow passes again"                  >> "${_BODY_F}"
            echo ""                                                                                   >> "${_BODY_F}"
            echo "---"                                                                                >> "${_BODY_F}"
            echo "*Opened automatically by NasTech Issue Bot*"                                       >> "${_BODY_F}"
            BODY=$(cat "${_BODY_F}"); rm -f "${_BODY_F}"

            if [ -n "${EXISTING_ISSUE}" ]; then
              echo "Commenting on existing issue #${EXISTING_ISSUE}"
              _CMT_F=$(mktemp)
              echo "## 🔴 Still Failing ($(date -u +"%Y-%m-%d %H:%M UTC"))"               >> "${_CMT_F}"
              echo ""                                                                       >> "${_CMT_F}"
              echo "**Commit:** [\`${SHORT_SHA}\`](https://github.com/${REPO}/commit/${WF_HEAD_SHA})" >> "${_CMT_F}"
              echo "**Run:** [View run logs](${WF_HTML_URL})"                              >> "${_CMT_F}"
              echo ""                                                                       >> "${_CMT_F}"
              echo "${FAILED_JOBS}"                                                         >> "${_CMT_F}"
              echo ""                                                                       >> "${_CMT_F}"
              echo "*Updated by NasTech Issue Bot*"                                        >> "${_CMT_F}"
              gh issue comment "${EXISTING_ISSUE}" \
                --repo "${REPO}" \
                --body "$(cat "${_CMT_F}")" 2>/dev/null || echo "⚠️ Could not comment on issue"
              rm -f "${_CMT_F}"
            else
              echo "Opening new issue: ${ISSUE_TITLE}"
              NEW_ISSUE=$(gh issue create \
                --repo "${REPO}" \
                --title "${ISSUE_TITLE}" \
                --body "${BODY}" \
                --label "${LABEL}" \
                --label "auto-bot" 2>/dev/null) || NEW_ISSUE=""
              if [ -n "${NEW_ISSUE}" ]; then
                echo "✅ Created: ${NEW_ISSUE}"
              else
                echo "⚠️ Could not create issue (check token permissions)"
              fi
            fi

          elif [ "${WF_CONCLUSION}" = "success" ]; then
            # ── BUILD PASSED — close open failure issue if any ────────────────

            if [ -n "${EXISTING_ISSUE}" ]; then
              echo "Closing resolved issue #${EXISTING_ISSUE}"

              _FIX_F=$(mktemp)
              echo "## ✅ Fixed! ($(date -u +"%Y-%m-%d %H:%M UTC"))"                      >> "${_FIX_F}"
              echo ""                                                                       >> "${_FIX_F}"
              echo "\`${WF_NAME}\` is now passing."                                        >> "${_FIX_F}"
              echo "**Commit:** [\`${SHORT_SHA}\`](https://github.com/${REPO}/commit/${WF_HEAD_SHA})" >> "${_FIX_F}"
              echo "**Run:** [View passing run](${WF_HTML_URL})"                           >> "${_FIX_F}"
              echo ""                                                                       >> "${_FIX_F}"
              echo "Auto-closing this issue."                                               >> "${_FIX_F}"
              echo ""                                                                       >> "${_FIX_F}"
              echo "*Resolved by NasTech Issue Bot*"                                       >> "${_FIX_F}"
              gh issue comment "${EXISTING_ISSUE}" \
                --repo "${REPO}" \
                --body "$(cat "${_FIX_F}")" 2>/dev/null || true
              rm -f "${_FIX_F}"

              gh issue close "${EXISTING_ISSUE}" \
                --repo "${REPO}" --reason "completed" 2>/dev/null || true

              gh issue edit "${EXISTING_ISSUE}" \
                --repo "${REPO}" \
                --add-label "ci-fixed" \
                --remove-label "${LABEL}" 2>/dev/null || true

              echo "✅ Issue #${EXISTING_ISSUE} closed."
            else
              echo "✅ No open failure issue for '${WF_NAME}' — nothing to close."
            fi

          else
            echo "Conclusion '${WF_CONCLUSION}' — no action required."
          fi
