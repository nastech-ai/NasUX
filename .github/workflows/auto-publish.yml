name: NasUX Auto-Publish

on:
  workflow_run:
    workflows: ["Build NasUX"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read

# ── Only run when the triggering build passed ─────────────────────────────────
jobs:
  build-and-release:
    name: Build & Release (${{ matrix.package_variant }})
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        package_variant: [apt-android-7, apt-android-5]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-publish-${{ matrix.package_variant }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-publish-${{ matrix.package_variant }}-

      - name: Build NasUX APKs
        shell: bash {0}
        env:
          PACKAGE_VARIANT: ${{ matrix.package_variant }}
        run: |
          exit_on_error() { echo "$1"; exit 1; }

          # Determine SHA — prefer the SHA of the workflow that triggered us
          if [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
            BUILD_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            BUILD_SHA="${GITHUB_SHA}"
          fi
          SHORT_SHA="${BUILD_SHA:0:7}"

          CURRENT_VERSION_NAME=$(grep -m1 'versionName "' app/build.gradle \
            | sed -r 's/\s+versionName "([^"]+)".*/\1/')
          RELEASE_VERSION_NAME="v${CURRENT_VERSION_NAME}+${SHORT_SHA}"

          APK_DIR_PATH="./app/build/outputs/apk/debug"

          # Human-readable APK version tag
          # Primary variant (apt-android-7): NasUX-App-ARM64-v0.119.0+abc1234.apk
          # Legacy variant  (apt-android-5): NasUX-App-ARM64-v0.119.0+abc1234-Legacy.apk
          if [ "${{ matrix.package_variant }}" = "apt-android-5" ]; then
            APK_VERSION_TAG="${RELEASE_VERSION_NAME}-Legacy"
          else
            APK_VERSION_TAG="${RELEASE_VERSION_NAME}"
          fi

          echo "APK_DIR_PATH=${APK_DIR_PATH}"               >> $GITHUB_ENV
          echo "APK_VERSION_TAG=${APK_VERSION_TAG}"         >> $GITHUB_ENV
          echo "RELEASE_VERSION_NAME=${RELEASE_VERSION_NAME}" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}"                     >> $GITHUB_ENV
          echo "CURRENT_VERSION_NAME=${CURRENT_VERSION_NAME}" >> $GITHUB_ENV

          echo "Building NasUX ${APK_VERSION_TAG} (variant: ${{ matrix.package_variant }})"

          export NASUX_APP_VERSION_NAME="${CURRENT_VERSION_NAME}"
          export NASUX_APK_VERSION_TAG="${APK_VERSION_TAG}"
          export NASUX_PACKAGE_VARIANT="${{ matrix.package_variant }}"

          if ! ./gradlew assembleDebug --no-daemon; then
            exit_on_error "Build failed for '${APK_VERSION_TAG}'."
          fi

          echo "Validating APKs..."
          for abi_label in Universal ARM64 ARM32 x86_64 x86; do
            APK_FILE="${APK_DIR_PATH}/NasUX-App-${abi_label}-${APK_VERSION_TAG}.apk"
            if ! test -f "${APK_FILE}"; then
              echo "Files found:"; ls "${APK_DIR_PATH}/" || true
              exit_on_error "Missing APK: NasUX-App-${abi_label}-${APK_VERSION_TAG}.apk"
            fi
            echo "  ✓ NasUX-App-${abi_label}-${APK_VERSION_TAG}.apk"
          done

          echo "Generating sha256sums..."
          (cd "${APK_DIR_PATH}"; sha256sum \
            "NasUX-App-Universal-${APK_VERSION_TAG}.apk" \
            "NasUX-App-ARM64-${APK_VERSION_TAG}.apk" \
            "NasUX-App-ARM32-${APK_VERSION_TAG}.apk" \
            "NasUX-App-x86_64-${APK_VERSION_TAG}.apk" \
            "NasUX-App-x86-${APK_VERSION_TAG}.apk" \
            > "NasUX-App-SHA256-${APK_VERSION_TAG}.txt") \
            || exit_on_error "sha256sum failed"

          cat "${APK_DIR_PATH}/NasUX-App-SHA256-${APK_VERSION_TAG}.txt"
          echo "✅ Build and validation complete."

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NasUX-APKs-${{ matrix.package_variant }}-${{ env.APK_VERSION_TAG }}
          path: |
            ${{ env.APK_DIR_PATH }}/NasUX-App-*-${{ env.APK_VERSION_TAG }}.apk
            ${{ env.APK_DIR_PATH }}/NasUX-App-SHA256-${{ env.APK_VERSION_TAG }}.txt
          retention-days: 90

  # ── Generate release notes from recent commits ────────────────────────────────
  generate-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      notes:       ${{ steps.notes.outputs.notes }}
      release_tag: ${{ steps.notes.outputs.release_tag }}
      version:     ${{ steps.notes.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          VERSION=$(grep -m1 'versionName "' app/build.gradle \
            | sed -r 's/\s+versionName "([^"]+)".*/\1/')

          if [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${GITHUB_SHA}"
          fi
          SHORT_SHA="${SHA:0:7}"
          RELEASE_TAG="v${VERSION}+${SHORT_SHA}"
          DATE=$(date -u +"%B %d, %Y")

          echo "version=${VERSION}"       >> $GITHUB_OUTPUT
          echo "release_tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT

          # Commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RANGE="${LAST_TAG:+${LAST_TAG}..HEAD}"
          RANGE="${RANGE:-HEAD~15..HEAD}"

          collect_type() {
            git log $RANGE --pretty=format:"- %s (\`%h\`)" --no-merges \
              | grep -iE "^- ${1}(\(.*\))?!?:" | head -15 || true
          }

          FEATS=$(collect_type "feat")
          FIXES=$(collect_type "fix")
          PERF=$(collect_type "perf")
          SECS=$(collect_type "sec")
          OTHERS=$(git log $RANGE --pretty=format:"- %s (\`%h\`)" --no-merges \
            | grep -v '\[skip ci\]' \
            | grep -ivE "^- (feat|fix|perf|sec|chore|ci|build|docs|style|test|refactor)(\(.*\))?!?:" \
            | head -10 || true)

          cat > /tmp/release_notes.md << NOTES_END
          ## NasUX ${RELEASE_TAG} — Powered by NasTech AI
          **Released:** ${DATE}  |  **Commit:** \`${SHORT_SHA}\`

          ---
          NOTES_END

          if [ -n "$FEATS" ]; then
            echo -e "\n### ✨ New Features\n${FEATS}" >> /tmp/release_notes.md
          fi
          if [ -n "$FIXES" ]; then
            echo -e "\n### 🐛 Bug Fixes\n${FIXES}" >> /tmp/release_notes.md
          fi
          if [ -n "$PERF" ]; then
            echo -e "\n### ⚡ Performance\n${PERF}" >> /tmp/release_notes.md
          fi
          if [ -n "$SECS" ]; then
            echo -e "\n### 🔒 Security\n${SECS}" >> /tmp/release_notes.md
          fi
          if [ -n "$OTHERS" ]; then
            echo -e "\n### 🔧 Other Changes\n${OTHERS}" >> /tmp/release_notes.md
          fi
          if [ -z "${FEATS}${FIXES}${PERF}${SECS}${OTHERS}" ]; then
            echo -e "\n### 🏗️ Maintenance\n- Internal improvements and CI updates" \
              >> /tmp/release_notes.md
          fi

          cat >> /tmp/release_notes.md << 'INST_END'

          ---
          ### 📲 Installation

          | APK File | Target Device |
          |---|---|
          | `NasUX-App-ARM64-*.apk` | ⭐ **Recommended** — most modern phones (Pixel, Samsung, OnePlus, Xiaomi, etc.) |
          | `NasUX-App-ARM32-*.apk` | Older 32-bit Android phones |
          | `NasUX-App-Universal-*.apk` | Any Android device (works everywhere, larger file) |
          | `NasUX-App-x86_64-*.apk` | Android emulators / Intel x86 tablets |
          | `NasUX-App-x86-*.apk` | 32-bit Android emulators |

          Files ending in `-Legacy` use the `apt-android-5` bootstrap (same device support, different package repo).
          Most users should pick the standard (non-Legacy) APK.

          > **First run:** NasTech AI Agent installs automatically into `~/nastech-agent/`.
          > Tap the **teal glowing FAB** or run `nastech chat` to start the AI.

          > Verify file integrity with the attached `NasUX-App-SHA256-*.txt`.
          INST_END

          echo "✅ Release notes generated."
          cat /tmp/release_notes.md

          {
            echo 'notes<<NOTES_DELIM'
            cat /tmp/release_notes.md
            echo 'NOTES_DELIM'
          } >> $GITHUB_OUTPUT

  # ── Create GitHub Release and attach all APKs ─────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-release, generate-notes]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-apks
          merge-multiple: true

      - name: List APKs to publish
        run: |
          echo "=== APKs ready for release ==="
          find ./release-apks -type f | sort
          echo ""
          echo "Total: $(find ./release-apks -name '*.apk' | wc -l) APK files"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:  ${{ needs.generate-notes.outputs.release_tag }}
          name:      "NasUX ${{ needs.generate-notes.outputs.release_tag }}"
          body:      ${{ needs.generate-notes.outputs.notes }}
          files: |
            ./release-apks/**/*.apk
            ./release-apks/**/NasUX-App-SHA256-*.txt
          draft:      false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Post a rich build-monitor summary ─────────────────────────────────────────
  build-monitor:
    name: Build Monitor Summary
    runs-on: ubuntu-latest
    needs: [build-and-release, generate-notes, publish-release]
    if: always()

    steps:
      - name: Write job summary
        shell: bash
        run: |
          VERSION="${{ needs.generate-notes.outputs.version }}"
          TAG="${{ needs.generate-notes.outputs.release_tag }}"
          BUILD="${{ needs.build-and-release.result }}"
          PUBLISH="${{ needs.publish-release.result }}"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          b() { [ "$1" = "success" ] && echo "✅ success" || echo "❌ $1"; }

          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          # 📦 NasUX Build Monitor

          | | |
          |---|---|
          | **App** | NasUX — Powered by NasTech AI |
          | **Version** | \`${VERSION}\` |
          | **Release Tag** | \`${TAG}\` |
          | **Built** | ${DATE} |
          | **Build APKs** | $(b "$BUILD") |
          | **Publish Release** | $(b "$PUBLISH") |

          ## 📱 APK Variants

          | Variant | Bootstrap | ABIs |
          |---|---|---|
          | \`apt-android-7\` | Android 7+ | universal, arm64-v8a, armeabi-v7a, x86_64, x86 |
          | \`apt-android-5\` | Android 5+ | universal, arm64-v8a, armeabi-v7a, x86_64, x86 |

          ## ✅ CI Health

          | Check | Status |
          |---|---|
          | Build NasUX | Triggered this publish |
          | APK Build | $(b "$BUILD") |
          | GitHub Release | $(b "$PUBLISH") |

          > 📎 Download APKs from the [Releases page](https://github.com/${{ github.repository }}/releases/tag/${TAG}).
          SUMMARY

          echo "✅ Build monitor summary written to job summary."
