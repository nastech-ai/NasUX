name: NasUX Auto-Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release version tag (e.g. v0.119.0)'
        required: true
        default: 'v0.119.0'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APKs & Create Release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version_tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Build NasUX APKs
        shell: bash
        env:
          PACKAGE_VARIANT: ${{ matrix.package_variant }}
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          APK_VERSION_TAG="v$VERSION+${{ matrix.package_variant }}-github-release"
          APK_BASENAME_PREFIX="nasux-app_${APK_VERSION_TAG}"
          APK_DIR="./app/build/outputs/apk/release"

          echo "Building NasUX v$VERSION APKs (variant: ${{ matrix.package_variant }})"

          export NASUX_APP_VERSION_NAME="$VERSION"
          export NASUX_APK_VERSION_TAG="$APK_VERSION_TAG"
          export NASUX_PACKAGE_VARIANT="${{ matrix.package_variant }}"

          ./gradlew assembleRelease || ./gradlew assembleDebug

          # Support both debug and release output dirs
          APK_DIR_RELEASE="./app/build/outputs/apk/release"
          APK_DIR_DEBUG="./app/build/outputs/apk/debug"
          if ls "$APK_DIR_RELEASE"/*.apk 1>/dev/null 2>&1; then
            APK_DIR="$APK_DIR_RELEASE"
          else
            APK_DIR="$APK_DIR_DEBUG"
          fi

          echo "APK_DIR=$APK_DIR"         >> $GITHUB_ENV
          echo "APK_VERSION_TAG=$APK_VERSION_TAG" >> $GITHUB_ENV
          echo "APK_BASENAME_PREFIX=$APK_BASENAME_PREFIX" >> $GITHUB_ENV

          # Rename output APKs to NasUX naming convention
          # Gradle produces NasUX-App-<Label>-<tag>.apk; map label → abi suffix
          declare -A ABI_LABEL=(
            [universal]="Universal"
            [arm64-v8a]="ARM64"
            [armeabi-v7a]="ARM32"
            [x86_64]="x86_64"
            [x86]="x86"
          )
          for abi in universal arm64-v8a armeabi-v7a x86_64 x86; do
            LABEL="${ABI_LABEL[$abi]}"
            SRC="$APK_DIR/NasUX-App-${LABEL}-${APK_VERSION_TAG}.apk"
            if [ -f "$SRC" ]; then
              cp "$SRC" "$APK_DIR/${APK_BASENAME_PREFIX}_${abi}.apk"
              echo "  ✓ $abi"
            else
              echo "  ⚠ $abi — not found at $SRC (skipping)"
            fi
          done

      - name: Generate checksums
        run: |
          cd "${{ env.APK_DIR }}"
          sha256sum ${{ env.APK_BASENAME_PREFIX }}_*.apk > ${{ env.APK_BASENAME_PREFIX }}_sha256sums.txt
          cat ${{ env.APK_BASENAME_PREFIX }}_sha256sums.txt

      - name: Upload APKs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nasux-apks-${{ matrix.package_variant }}
          path: |
            ${{ env.APK_DIR }}/${{ env.APK_BASENAME_PREFIX }}_*.apk
            ${{ env.APK_DIR }}/${{ env.APK_BASENAME_PREFIX }}_sha256sums.txt
          retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version_tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Download all APK artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-apks
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "NasUX ${{ steps.tag.outputs.tag }} — Powered by NasTech AI"
          body: |
            ## NasUX ${{ steps.tag.outputs.tag }}
            **Powered by NasTech AI** — Full Linux terminal + AI agent on Android.

            ### What's New
            - NasTech AI Agent bundled and auto-installs on first boot
            - Glowing NasTech FAB for instant AI summoning
            - AMOLED pure-black theme with neon ANSI highlights
            - `nastech-*` CLI commands for AI and system control
            - User-customisable theme, 12 AMOLED presets + wallpaper
            - Auto-update via `nastech-update` command

            ### Installation
            Download the APK for your device architecture:
            - **arm64-v8a** — most modern Android phones (Pixel, Samsung S/A/M series)
            - **armeabi-v7a** — older 32-bit Android devices
            - **universal** — works on any device
            - **x86_64 / x86** — Android emulators & x86 tablets

            ### First Run
            1. Install the APK (enable "Unknown sources" in Settings)
            2. NasTech AI Agent installs automatically
            3. Tap the **teal glow FAB** or open the sidebar to start AI

            ### Checksums
            See `*_sha256sums.txt` attached for file integrity verification.
          files: |
            ./release-apks/**/*.apk
            ./release-apks/**/*sha256sums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
