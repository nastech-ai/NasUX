name: Build NasUX

on:
  push:
    branches:
      - master
      - 'github-releases/**'
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build NasUX APKs
        shell: bash {0}
        env:
          PACKAGE_VARIANT: ${{ matrix.package_variant }}
        run: |
          exit_on_error() { echo "$1"; exit 1; }

          echo "Setting vars"

          if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
              GITHUB_SHA="${{ github.event.pull_request.head.sha }}"
          fi

          CURRENT_VERSION_NAME_REGEX='\s+versionName "([^"]+)"$'
          CURRENT_VERSION_NAME="$(grep -m 1 -E "$CURRENT_VERSION_NAME_REGEX" ./app/build.gradle \
            | sed -r "s/$CURRENT_VERSION_NAME_REGEX/\1/")"

          # Human-readable version tag for APK filenames
          # Format: NasUX-App-ARM64-v0.119.0.apk  (primary variant)
          #         NasUX-App-ARM64-v0.119.0-Legacy.apk  (apt-android-5)
          if [ "${{ matrix.package_variant }}" = "apt-android-5" ]; then
            APK_VERSION_TAG="v${CURRENT_VERSION_NAME}-Legacy"
          else
            APK_VERSION_TAG="v${CURRENT_VERSION_NAME}"
          fi

          APK_DIR_PATH="./app/build/outputs/apk/debug"

          echo "APK_DIR_PATH=${APK_DIR_PATH}"       >> $GITHUB_ENV
          echo "APK_VERSION_TAG=${APK_VERSION_TAG}" >> $GITHUB_ENV

          echo "Building NasUX APKs — version tag: ${APK_VERSION_TAG}"
          export NASUX_APP_VERSION_NAME="${CURRENT_VERSION_NAME}"
          export NASUX_APK_VERSION_TAG="${APK_VERSION_TAG}"
          export NASUX_PACKAGE_VARIANT="${{ env.PACKAGE_VARIANT }}"

          if ! ./gradlew assembleDebug; then
            exit_on_error "Build failed for '${APK_VERSION_TAG}'."
          fi

          echo "Validating APKs…"
          for abi_label in Universal ARM64 ARM32 x86_64 x86; do
            APK_FILE="${APK_DIR_PATH}/NasUX-App-${abi_label}-${APK_VERSION_TAG}.apk"
            if ! test -f "${APK_FILE}"; then
              exit_on_error "Missing APK: NasUX-App-${abi_label}-${APK_VERSION_TAG}.apk. Found: $(ls "${APK_DIR_PATH}")"
            fi
            echo "  ✓ NasUX-App-${abi_label}-${APK_VERSION_TAG}.apk"
          done

          echo "Generating SHA-256 checksums…"
          if ! (cd "${APK_DIR_PATH}"; sha256sum \
            "NasUX-App-Universal-${APK_VERSION_TAG}.apk" \
            "NasUX-App-ARM64-${APK_VERSION_TAG}.apk" \
            "NasUX-App-ARM32-${APK_VERSION_TAG}.apk" \
            "NasUX-App-x86_64-${APK_VERSION_TAG}.apk" \
            "NasUX-App-x86-${APK_VERSION_TAG}.apk" \
            > "NasUX-App-SHA256-${APK_VERSION_TAG}.txt"); then
            exit_on_error "sha256sum generation failed."
          fi
          echo "✅ Build complete."

      - name: Attach APKs and checksums
        uses: actions/upload-artifact@v4
        with:
          name: NasUX-APKs-${{ matrix.package_variant }}-${{ env.APK_VERSION_TAG }}
          path: |
            ${{ env.APK_DIR_PATH }}/NasUX-App-*-${{ env.APK_VERSION_TAG }}.apk
            ${{ env.APK_DIR_PATH }}/NasUX-App-SHA256-${{ env.APK_VERSION_TAG }}.txt
          retention-days: 90
