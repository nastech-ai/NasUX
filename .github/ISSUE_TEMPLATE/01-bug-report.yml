name: "Bug report"
description: "Create a report to help us improve NasUX"
title: "[Bug]: "
labels: ["bug report"]
body:
  - type: markdown
    attributes:
      value: |
        **THIS IS THE BUG TRACKER FOR THE NasUX APP. IF YOU HAVE ISSUES WITH A PACKAGE INSIDE THE APP, PLEASE OPEN AN ISSUE AT [nastech-ai/NasTech-Agent](https://github.com/nastech-ai/NasTech-Agent) INSTEAD.**
        If you are unsure if this is a bug with the NasUX app itself or the NasTech AI Agent, kindly open the bug at [nastech-ai/NasTech-Agent](https://github.com/nastech-ai/NasTech-Agent) as it is likely related.

        Use search before you open an issue to check whether your issue has been already reported and perhaps solved.

        Android versions 5.x and 6.x are not supported anymore.

  - type: textarea
    attributes:
      label: Problem description
      description: |
        A clear and concise description of what the problem is. You may attach logs, screenshots, screen recordings or anything else that will help understand the issue.

        Issues without proper description will be closed without solution.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce the behavior.
      description: |
        Please post all necessary commands that are needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    attributes:
      label: What is the expected behavior?
  - type: textarea
    attributes:
      label: System information
      description: Please provide info about your device
      value: |
        * NasUX application version:
        * NasTech AI version (run `nastech --version`):
        * Android OS version:
        * Device model:
    validations:
      required: true
